# ============================================================
# main ブランチに push されたら GitHub Pages（本番）に自動デプロイする
#   gh-pages ブランチのルートにサイトを配置。
#   keep_files: true で PRプレビュー用のサブディレクトリ(pr-preview/)を保持。
# ============================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ソースを取得
        uses: actions/checkout@v4

      - name: gh-pages ブランチにデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
